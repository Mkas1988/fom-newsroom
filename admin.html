<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – FOM Newsroom</title>
    <link rel="icon" href="fom-logo.png">
    <style>
        @font-face { font-family: 'Neue-Haas-Grotesk-Display-Pro'; src: url('fonts/NeueHaasGroteskDisplayPro-Bold.woff2') format('woff2'); font-weight: 700; }
        @font-face { font-family: 'Neue-Haas-Grotesk-Text-Pro'; src: url('fonts/NeueHaasGroteskTextPro-Regular.woff2') format('woff2'); font-weight: 400; }
        @font-face { font-family: 'Neue-Haas-Grotesk-Text-Pro'; src: url('fonts/NeueHaasGroteskTextPro-Bold.woff2') format('woff2'); font-weight: 700; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Neue-Haas-Grotesk-Text-Pro', Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            text-align: center;
            max-width: 400px;
            width: 100%;
            padding: 48px 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }
        .login-box img { height: 56px; margin-bottom: 32px; }
        .login-box h2 {
            font-family: 'Neue-Haas-Grotesk-Display-Pro', Helvetica, Arial, sans-serif;
            font-size: 24px; font-weight: 700; color: #121212; margin-bottom: 8px;
        }
        .login-box p { font-size: 14px; color: #6D6D6D; margin-bottom: 28px; }
        .login-input {
            width: 100%; padding: 14px 18px; border: 1.5px solid #E6E6E6;
            border-radius: 8px; font-size: 16px; font-family: inherit;
            outline: none; transition: border-color .2s; text-align: center;
        }
        .login-input:focus { border-color: #00B5A5; }
        .login-input.error { border-color: #E81818; animation: shake .4s; }
        .login-btn {
            width: 100%; margin-top: 16px; padding: 14px;
            background: #00B5A5; color: white; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: background .2s;
        }
        .login-btn:hover { background: #009F8F; }
        .login-error { color: #E81818; font-size: 13px; margin-top: 12px; display: none; }
        .login-success {
            color: #00B5A5; font-size: 14px; margin-top: 16px; display: none;
            font-weight: 700;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="fom-logo.png" alt="FOM">
        <h2>Admin Login</h2>
        <p>Melden Sie sich an, um den Newsroom zu verwalten.</p>
        <form onsubmit="return doLogin()">
            <input type="password" class="login-input" id="passInput" placeholder="Passwort" autofocus>
            <button type="submit" class="login-btn">Anmelden</button>
        </form>
        <div class="login-error" id="loginError">Falsches Passwort. Bitte versuchen Sie es erneut.</div>
        <div class="login-success" id="loginSuccess">Erfolgreich angemeldet! Weiterleitung...</div>
    </div>

    <script>
        const CORRECT = 'Fom!1991';

        // Already logged in? Redirect
        if (sessionStorage.getItem('fom_newsroom_admin') === 'true') {
            window.location.href = 'index.html';
        }

        function doLogin() {
            var val = document.getElementById('passInput').value;
            if (val === CORRECT) {
                sessionStorage.setItem('fom_newsroom_admin', 'true');
                document.getElementById('loginError').style.display = 'none';
                document.getElementById('loginSuccess').style.display = 'block';
                setTimeout(function() { window.location.href = 'index.html'; }, 800);
                return false;
            }
            document.getElementById('passInput').classList.add('error');
            document.getElementById('loginError').style.display = 'block';
            setTimeout(function() { document.getElementById('passInput').classList.remove('error'); }, 400);
            return false;
        }
    </script>
</body>
</html>
