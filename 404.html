<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seite nicht gefunden – FOM Newsroom</title>
    <meta name="description" content="Die angeforderte Seite konnte nicht gefunden werden.">
    <meta name="robots" content="noindex">
    <link rel="icon" href="fom-logo.png">
    <style>
        @font-face { font-family: 'Neue-Haas-Grotesk-Display-Pro'; src: url('fonts/Neue-Haas-Grotesk-Display-Pro/Neue-Haas-Grotesk-Display-Pro-75-Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
        @font-face { font-family: 'Neue-Haas-Grotesk-Text-Pro'; src: url('fonts/Neue-Haas-Grotesk-Text-Pro/Neue-Haas-Grotesk-Text-Pro-55-Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Neue-Haas-Grotesk-Text-Pro', Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            color: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 24px;
        }
        .error-code {
            font-family: 'Neue-Haas-Grotesk-Display-Pro', Helvetica, Arial, sans-serif;
            font-size: 120px;
            font-weight: 700;
            color: #00B5A5;
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 {
            font-family: 'Neue-Haas-Grotesk-Display-Pro', Helvetica, Arial, sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #6D6D6D;
            max-width: 480px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: #00B5A5;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            transition: background .2s;
        }
        .back-link:hover { background: #009F8F; }
        .footer-note {
            position: absolute;
            bottom: 24px;
            font-size: 13px;
            color: #6D6D6D;
        }
        .footer-note a { color: #00B5A5; text-decoration: none; }
        .footer-note a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <h1>Seite nicht gefunden</h1>
    <p>Die angeforderte Seite existiert nicht oder wurde verschoben. Kehren Sie zum Newsroom zur&uuml;ck, um aktuelle Nachrichten und Pressemitteilungen zu finden.</p>
    <a href="/" class="back-link">&larr; Zur&uuml;ck zum Newsroom</a>
    <div class="footer-note">
        <a href="https://newsroom.fomhochschule.com">FOM Newsroom</a> &middot; <a href="https://www.fom.de">fom.de</a>
    </div>
</body>
</html>
