name: Deploy to IONOS via SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate sitemap
        run: python generate-sitemap.py

      - name: Generate static article pages
        run: python generate-articles.py

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y -qq lftp sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SFTP_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          lftp -e "
            set sftp:auto-confirm yes;
            set sftp:connect-program 'ssh -o StrictHostKeyChecking=no';
            set net:max-retries 3;
            set net:timeout 30;
            open -u $SFTP_USER,$SFTP_PASS sftp://$SFTP_HOST;
            mirror -R --delete --verbose \
              --exclude ^\.git/ \
              --exclude ^\.github/ \
              --exclude ^\.gitignore$ \
              --exclude ^generate-sitemap\.py$ \
              --exclude ^generate-articles\.py$ \
              --exclude ^_article_redirects\.htaccess$ \
              ./ /;
            quit
          "
