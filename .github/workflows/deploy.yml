name: Deploy to IONOS via SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate sitemap
        run: python generate-sitemap.py

      - name: Generate static article pages
        run: python generate-articles.py

      - name: Deploy via SFTP
        run: |
          sudo apt-get install -y -qq lftp
          lftp -e "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            set net:timeout 30;
            mirror -R --delete --verbose \
              --exclude ^\.git/ \
              --exclude ^\.github/ \
              --exclude ^\.gitignore$ \
              --exclude ^generate-sitemap\.py$ \
              --exclude ^generate-articles\.py$ \
              --exclude ^_article_redirects\.htaccess$ \
              ./ /;
            quit
          " -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" sftp://${{ secrets.FTP_SERVER }}:22
